<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lousa de Arquitetura</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234da3e8' d='M3 3h18v2H3zm0 4h18v2H3zm0 4h12v2H3zm0 4h8v2H3z'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens — idênticos ao op-explorer ── */
    :root {
      --bg:        #0f0f0f;
      --sidebar:   #161616;
      --panel:     #0f0f0f;
      --header:    #1a1a1a;
      --border:    #282828;
      --text:      #c8c8c8;
      --text-dim:  #555;
      --text-hi:   #f0f0f0;
      --text-body: #c0c0c0;
      --accent:    #0e639c;
      --accent-hi: #4da3e8;
      --sel:       #1e3347;
      --hover:     #1c1c1c;
      --font:      'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono:      'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); font-size: 13px; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: var(--header); border-bottom: 1px solid var(--border);
      padding: 6px 14px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; min-height: 36px;
    }
    #brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; user-select: none; }
    .brand-word {
      font-size: 15px; font-weight: 700; letter-spacing: .01em; line-height: 1;
      background: linear-gradient(100deg, #ff8a3d 0%, #ffd166 28%, #4da3e8 60%, #ff8a3d 100%);
      background-size: 280% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    @media (prefers-reduced-motion: no-preference) {
      .brand-word { animation: brandFlow 9s linear infinite; }
    }
    @keyframes brandFlow { to { background-position: 280% 0; } }

    .header-sep { color: var(--border); font-size: 16px; }
    .header-title { font-size: 13px; color: var(--text-dim); }

    /* file picker */
    #file-picker { display: flex; gap: 6px; margin-left: auto; align-items: center; }
    .file-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      cursor: pointer; font-size: 11px; padding: 3px 10px; border-radius: 3px; font-family: var(--font);
      transition: border-color .12s, color .12s;
    }
    .file-btn:hover { border-color: var(--accent); color: var(--text); }
    .file-btn.active { border-color: var(--accent-hi); color: var(--accent-hi); background: rgba(14,99,156,.12); }

    /* ── Main layout: left + divider + right ── */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── Left column: markdown ── */
    #col-md {
      width: 50%; min-width: 200px; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); overflow: hidden;
    }
    .col-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 30px;
      background: var(--header);
    }
    .col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); flex: 1; }
    .pane-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 3px; font-family: var(--font);
    }
    .pane-btn:hover { border-color: var(--accent); color: var(--text); }

    #md-scroll { flex: 1; overflow-y: auto; padding: 48px 60px 80px; }
    #md-content { max-width: 760px; }

    /* ── Drag divider ── */
    #divider {
      width: 4px; flex-shrink: 0; background: transparent; cursor: col-resize;
      transition: background .15s;
    }
    #divider:hover, #divider.dragging { background: var(--accent); }

    /* ── Right column: LikeC4 iframe ── */
    #col-c4 { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 200px; }
    #c4-frame { width: 100%; height: 100%; border: none; background: #111; }

    /* ── Markdown typography — copiado do op-explorer ── */
    #md-content h1 {
      font-size: 28px; font-weight: 700; line-height: 1.25;
      margin-bottom: 24px; color: var(--text-hi); letter-spacing: -.01em;
    }
    #md-content h2 {
      font-size: 20px; font-weight: 700; line-height: 1.3;
      margin: 40px 0 12px; color: var(--text-hi); letter-spacing: -.01em;
    }
    #md-content h3 {
      font-size: 17px; font-weight: 600; line-height: 1.4;
      margin: 28px 0 8px; color: var(--text-hi);
    }
    #md-content h4 {
      font-size: 15px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; margin: 22px 0 6px; color: var(--text-dim);
    }
    #md-content p {
      font-size: 16px; line-height: 1.78; margin-bottom: 16px; color: var(--text-body);
    }
    #md-content ul, #md-content ol {
      margin: 4px 0 16px 24px; font-size: 16px; line-height: 1.78; color: var(--text-body);
    }
    #md-content li { margin-bottom: 6px; }
    #md-content li > ul, #md-content li > ol { margin-top: 4px; margin-bottom: 4px; }
    #md-content a { color: var(--accent-hi); text-decoration: none; }
    #md-content a:hover { text-decoration: underline; }
    #md-content strong { color: var(--text-hi); font-weight: 600; }
    #md-content em { color: var(--text-hi); }
    #md-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    #md-content code {
      font-family: var(--mono); font-size: 13.5px;
      background: rgba(255,255,255,.07); border-radius: 4px;
      padding: 2px 6px; color: #d4d4d4;
    }
    #md-content pre {
      background: #080808; border-radius: 8px; padding: 20px 22px;
      overflow-x: auto; margin: 20px 0; border: 1px solid var(--border); line-height: 1.6;
    }
    #md-content pre code { background: none; padding: 0; font-size: 13.5px; }
    #md-content table {
      border-collapse: collapse; width: 100%; margin: 20px 0;
      font-size: 15px; line-height: 1.6;
    }
    #md-content th, #md-content td {
      border: 1px solid var(--border); padding: 9px 14px; text-align: left;
    }
    #md-content th {
      background: rgba(255,255,255,.05); color: var(--text-hi);
      font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    }
    #md-content tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    #md-content blockquote {
      border-left: 3px solid var(--accent-hi); margin: 20px 0;
      padding: 12px 20px; background: rgba(14,99,156,.08);
      border-radius: 0 6px 6px 0; font-size: 16px; line-height: 1.7; color: #aaa;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* c4 status */
    #c4-status {
      padding: 6px 14px; font-size: 11px; color: var(--text-dim);
      border-bottom: 1px solid var(--border); background: var(--header); flex-shrink: 0;
    }
    #c4-status a { color: var(--accent-hi); text-decoration: none; }
    #c4-status a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="header">
  <div id="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="18" height="2" rx="1" fill="#4da3e8"/>
      <rect x="3" y="7" width="18" height="2" rx="1" fill="#4da3e8" opacity=".8"/>
      <rect x="3" y="11" width="12" height="2" rx="1" fill="#4da3e8" opacity=".6"/>
      <rect x="3" y="15" width="8" height="2" rx="1" fill="#ff8a3d" opacity=".9"/>
    </svg>
    <span class="brand-word">Lousa de Arquitetura</span>
  </div>
  <span class="header-sep">|</span>
  <span class="header-title">Protótipo 1 — 2 colunas</span>
  <div id="file-picker">
    <span style="font-size:11px;color:var(--text-dim)">Nível:</span>
    <button class="file-btn active" data-file="../notes/overview.md" onclick="loadMd(this)">Panorama</button>
    <button class="file-btn" data-file="../notes/mind-runtime.md" onclick="loadMd(this)">Mind Runtime</button>
  </div>
</div>

<div id="app">
  <!-- ── Coluna esquerda: Markdown ── -->
  <div id="col-md">
    <div class="col-toolbar">
      <span class="col-label">Markdown</span>
      <button class="pane-btn" title="Diminuir texto" onclick="zoom(-1)">A−</button>
      <button class="pane-btn" title="Aumentar texto" onclick="zoom(+1)">A+</button>
      <button class="pane-btn" title="Resetar zoom" onclick="zoom(0)">1×</button>
    </div>
    <div id="md-scroll">
      <div id="md-content"><p style="color:var(--text-dim);padding-top:40px;text-align:center">Carregando…</p></div>
    </div>
  </div>

  <!-- ── Divisor arrastável ── -->
  <div id="divider"></div>

  <!-- ── Coluna direita: LikeC4 ── -->
  <div id="col-c4">
    <div class="col-toolbar">
      <span class="col-label">LikeC4 — Blueprint</span>
      <button class="pane-btn" onclick="reloadC4()" title="Recarregar diagrama">↺</button>
    </div>
    <div id="c4-status">
      Diagrama servido por <code>likec4 start</code> em
      <a id="c4-link" href="http://localhost:5173" target="_blank">localhost:5173</a>.
      Se aparecer em branco, rode: <code>cd /home/lusga/workspace/spikes/001-likec4-mind-bootstrap && npx likec4 start</code>
    </div>
    <div style="position:relative;flex:1;display:flex;flex-direction:column;">
      <iframe id="c4-frame" src="http://localhost:5173" allow="fullscreen" title="LikeC4 Blueprint" style="flex:1;border:none;background:#111;"></iframe>
      <div id="iframe-overlay" style="display:none;position:absolute;inset:0;z-index:10;cursor:col-resize;"></div>
    </div>
  </div>
</div>

<script>
  /* ── Zoom ── */
  let zoomLevel = 0;
  const BASE_SIZE = 16;
  function zoom(delta) {
    if (delta === 0) zoomLevel = 0;
    else zoomLevel = Math.max(-4, Math.min(6, zoomLevel + delta));
    document.getElementById('md-content').style.fontSize = (BASE_SIZE + zoomLevel * 1.5) + 'px';
  }

  /* ── Markdown loader ── */
  async function loadMd(btn) {
    const file = btn?.dataset?.file || 'content/overview.md';
    document.querySelectorAll('.file-btn').forEach(b => b.classList.toggle('active', b.dataset.file === file));
    const el = document.getElementById('md-content');
    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error(res.status);
      const text = await res.text();
      el.innerHTML = marked.parse(text);
    } catch(e) {
      el.innerHTML = `<p style="color:var(--error,#f44747)">Erro ao carregar <code>${file}</code>: ${e.message}</p>`;
    }
    document.getElementById('md-scroll').scrollTop = 0;
  }

  /* ── Divider drag ── */
  const divider   = document.getElementById('divider');
  const colMd     = document.getElementById('col-md');
  const iframeOverlay = document.getElementById('iframe-overlay');
  let dragging = false, startX = 0, startW = 0;

  divider.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = colMd.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    iframeOverlay.style.display = 'block'; /* bloqueia o iframe durante o drag */
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const app = document.getElementById('app');
    const appW = app.offsetWidth;
    const newW = Math.max(200, Math.min(appW - 200 - 4, startW + (e.clientX - startX)));
    colMd.style.width = newW + 'px';
    colMd.style.flex = 'none';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    iframeOverlay.style.display = 'none';
  });

  function reloadC4() {
    const f = document.getElementById('c4-frame');
    f.src = f.src;
  }

  /* ── Boot ── */
  loadMd({ dataset: { file: '../notes/overview.md' } });
</script>
</body>
</html>
